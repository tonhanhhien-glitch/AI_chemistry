services:
  - type: web
    name: vsepr-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - { key: DATA_DIR, value: /var/data }
      - { key: ENABLE_CLAUDE, value: "false" }
      - { key: ENABLE_PUBCHEM, value: "false" }
      - { key: ENABLE_RDKIT, value: "false" }
      - { key: TEACHER_EXPORT_TOKEN, sync: false }
    disk: { name: study-data, mountPath: /var/data, sizeGB: 1 }
  - type: web
    name: vsepr-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - { key: VITE_API_BASE_URL, value: https://replace-with-backend.example/api/v1 }
