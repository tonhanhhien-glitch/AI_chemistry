upstream vsepr_backend { server backend:8000; }
server {
  listen 80;
  server_name _;
  client_max_body_size 1m;
  location /api/ { proxy_pass http://vsepr_backend; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_connect_timeout 5s; proxy_read_timeout 30s; }
  location / { proxy_pass http://frontend:80; proxy_set_header Host $host; }
}
