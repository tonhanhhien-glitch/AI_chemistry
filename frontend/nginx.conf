server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 "ok\n"; }
  location /api/ { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_connect_timeout 5s; proxy_read_timeout 30s; }
  location / { try_files $uri $uri/ /index.html; }
  location ~* \.(?:js|css|svg|woff2?)$ { expires 7d; add_header Cache-Control "public, immutable"; try_files $uri =404; }
}
